<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head th:replace="~{fragments/head :: head('Photo')}"></head>


<body>

    <nav th:replace="~{fragments/navbar :: nav}"></nav>

    <main class="container mt-2 py-5">
        <h2 class="mt-3">Qui potrai caricare le tue foto</h2>
        <h5 th:if="${error}" class="text-danger" th:text="${error}"></h5>
        <h5 th:if="${success}" class="text-success" th:text="${success}"></h5>
        
        <!-- Sezione caricamento foto -->

        <form th:action="@{./upload}" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label" for="photo">Carica la tua foto</label>
                <input class="form-control" type="file" name="files" id="fileInput" accept="image/*" multiple>
            </div>

            <button class="btn btn-primary" type="submit">Invia</button>
        </form>
            <!-- Preview -->
        <div class="preview-container d-block" id="preview"></div>

        <!-- Sezione risultato caricamento -->

        <div class="row" th:if="${success}">
            <p th:if="${uploadedFiles.size > 1}" class="col-12">Questi sono i link per visualizzare le foto:</p>
            <p th:unless="${uploadedFiles.size > 1}" class="col-12">Questo Ã¨ il link per visualizzare la foto:</p>
            <div class="col-12" th:each="uploadedFile : ${uploadedFiles}" th:object="${uploadedFile}">
                <a class="link-primary link-underline-opacity-25 link-opacity-100-hover" th:href="*{url}"
                    target="_blank">[[*{name}]]</a>
            </div>

        </div>
    </main>


    <th:block th:replace="~{fragments/footer :: script}"></th:block>

</body>

</html>
